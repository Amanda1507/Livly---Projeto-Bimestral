<body>
<div class="formulario">
  <div class="formulario-left">
    <h1>Crie sua<br>Conta</h1>
    <div class="formulario-info">
      <span class="formulario-label">Já tem conta?</span>
      <span>Faça seu login aqui</span>
    </div>
    <div class="formulario-info">
      <span class="formulario-label">Dúvidas?</span>
      <span>contato@livly.com</span>
    </div>
  </div>

  <div class="formulario-right">
    <form id="formCadastro">
      <div class="campo">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="Seu nome completo" />
      </div>
      <div class="campo">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" />
      </div>
      <div class="campo">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Crie uma senha" />
      </div>
      <p id="mensagem"></p>
      <button type="submit">Cadastrar</button>
    </form>
  </div>
</div>

    </footer>
