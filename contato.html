<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Livly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/contato.css">
</head>
<body>

    <header>
        <img src="img/logo.png" class="logo">
        <nav>
            <a href="index.html">Início</a>
            <a href="produtos.html">Livros</a>
            <a href="cadastro.html">Cadastro</a>
            <a href="contato.html">Contato</a>
            <a href="empresa.html">Sobre Nós</a>
        </nav>

    </header>
    
    <section class="contato-section">
      <div class="contato-left">
        <h1>Entre em<br>Contato</h1>
        <div class="contato-info">
          <span class="contato-label">E-mail</span>
          <span>contato@livly.com</span>
        </div>
        <div class="contato-info">
          <span class="contato-label">Instagram</span>
          <span>@livly</span>
        </div>
        <div class="contato-info">
          <span class="contato-label">WhatsApp</span>
          <span>(11) 99999-9999</span>
        </div>
        <div class="contato-socials">
          <a href="#" class="social-icon">📷</a>
          <a href="#" class="social-icon">💬</a>
          <a href="#" class="social-icon">✉️</a>
        </div>
      </div>
    
      <div class="contato-right">
        <form id="formContato">
          <div class="campo">
            <label>Seu nome</label>
            <input type="text" placeholder="Nome completo" />
          </div>
          <div class="campo">
            <label>E-mail</label>
            <input type="email" placeholder="seu@email.com" />
          </div>
          <div class="campo">
            <label>Mensagem</label>
            <textarea rows="3" placeholder="Digite sua mensagem..."></textarea>
          </div>
          <button type="submit">Enviar mensagem</button>
        </form>
      </div>
    </section>

    <footer>
        <div class="rodape">© 2026 Amanda Nunes - Todos os direitos reservados.</div>
    </footer>
</body>
</html>
